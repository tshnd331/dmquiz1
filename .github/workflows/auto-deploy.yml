name: auto-deploy

# Fires only after a human merges to main (gate #2). Runs on the
# self-hosted runner that lives on the IDCF server (see
# docs/AUTOMATION_SETUP.md), so deployment happens locally with no
# inbound FW change and no SSH.

on:
  push:
    branches: [main]

permissions:
  contents: read
  issues: write

concurrency:
  group: auto-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted]
    # Keep the same project name as the manually-started stack so we update
    # the existing containers/volume instead of creating a parallel one.
    env:
      COMPOSE_PROJECT_NAME: dmquiz1
    steps:
      - uses: actions/checkout@v4
        # Full history so `git log <before>..<sha>` can resolve Issue refs
        # below (default fetch-depth: 1 would make the range empty).
        with:
          fetch-depth: 0

      # `.env` is gitignored, so the runner's fresh checkout never contains it
      # (and checkout's default `clean: true` would wipe any hand-placed copy).
      # docker-compose.yml's `env_file: .env` is resolved by the compose CLI
      # against this working dir, so regenerate `.env` here from GitHub
      # Secrets/Variables every deploy. The bot image excludes `.env`
      # (.dockerignore), so its runtime env comes solely from these values
      # injected at `up` time — i.e. the bot's env is refreshed each deploy.
      - name: Generate .env from secrets
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_GUILD_ID: ${{ vars.DISCORD_GUILD_ID }}
          ADMIN_CHANNEL_ID: ${{ secrets.ADMIN_CHANNEL_ID }}
          # bot's Issue-creation PAT. `GITHUB_TOKEN` is an Actions-reserved
          # name and can't be a custom secret, so reuse AUTOMATION_TOKEN
          # (Issues R/W; see docs/AUTOMATION_SETUP.md §2) and map it below.
          BOT_GITHUB_TOKEN: ${{ secrets.AUTOMATION_TOKEN }}
          GITHUB_REPO: ${{ vars.GITHUB_REPO || 'tshnd331/dmquiz1' }}
          FIX_AGENT: ${{ vars.FIX_AGENT || 'copilot' }}
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
        run: |
          umask 077
          # Fail-fast on the only vars the bot needs to boot (config.ts's
          # requireBotConfig). Generating an empty token would deploy a bot
          # that crash-loops on login = silent downtime; stop here instead.
          # The rest (ADMIN_CHANNEL_ID/AUTOMATION_TOKEN/...) are optional —
          # missing ones only disable the feedback pipeline, not boot.
          missing=""
          [ -n "$DISCORD_TOKEN" ] || missing="$missing DISCORD_TOKEN"
          [ -n "$DISCORD_CLIENT_ID" ] || missing="$missing DISCORD_CLIENT_ID"
          if [ -n "$missing" ]; then
            echo "::error::Missing required secret(s):$missing — register them in Settings → Secrets and variables → Actions (see docs/AUTOMATION_SETUP.md §2)."
            exit 1
          fi
          cat > .env <<EOF
          DISCORD_TOKEN=${DISCORD_TOKEN}
          DISCORD_CLIENT_ID=${DISCORD_CLIENT_ID}
          DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
          ADMIN_CHANNEL_ID=${ADMIN_CHANNEL_ID}
          GITHUB_TOKEN=${BOT_GITHUB_TOKEN}
          GITHUB_REPO=${GITHUB_REPO}
          FIX_AGENT=${FIX_AGENT}
          CLAUDE_API_KEY=${CLAUDE_API_KEY}
          EOF

      # docker-entrypoint.sh runs `prisma migrate deploy` on container start.
      # Limit to the `bot` service so the runner container is never recreated.
      - name: Build & restart bot
        run: |
          docker compose build bot
          docker compose up -d bot

      # Re-register slash commands from the just-deployed commit so the
      # Discord-side command schema never drifts from the running handler.
      # Use `exec` (not `run`) so we reuse the already-started container:
      # `run` would spawn a second bot whose entrypoint re-runs
      # `prisma migrate deploy` concurrently, racing on the shared SQLite DB.
      - name: Sync Discord slash commands
        run: docker compose exec -T bot npm run deploy-commands

      - name: Close resolved feedback Issues
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_TOKEN || github.token }}
        run: |
          # Collect "Closes/Fixes #N" references from the pushed commits.
          nums=$(git log --format=%B ${{ github.event.before }}..${{ github.sha }} \
            | grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?) #[0-9]+' \
            | grep -oE '[0-9]+' | sort -u)
          for num in $nums; do
            echo "Closing Issue #$num"
            gh issue close "$num" --comment "✅ main にマージ・デプロイ完了したためクローズします。" || true
          done

      - name: Notify Discord
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$WEBHOOK" ]; then
            status="${{ job.status }}"
            curl -sf -H "Content-Type: application/json" \
              -d "{\"content\":\"🚀 デプロイ ${status}: \`${{ github.sha }}\` を本番反映しました。\"}" \
              "$WEBHOOK" || true
          fi
